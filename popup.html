<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>灵算批量兑换</title>
    <style>
      * { box-sizing: border-box; }
      body { width: 380px; margin: 0; color: #172033; background: #f6f8fc; font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      main { padding: 16px; }
      h1 { margin: 0 0 12px; font-size: 18px; }
      label { display: block; margin: 14px 0 6px; font-weight: 600; }
      textarea, input { width: 100%; border: 1px solid #cbd5e1; border-radius: 7px; background: #fff; color: inherit; font: inherit; }
      textarea { padding: 9px; resize: vertical; }
      input { padding: 8px 9px; }
      button { width: 100%; margin-top: 10px; border: 0; border-radius: 7px; padding: 9px 12px; cursor: pointer; font: inherit; font-weight: 600; }
      button:disabled { cursor: not-allowed; opacity: .65; }
      .primary { color: #fff; background: #2563eb; }
      .secondary { margin-top: 0; color: #1d4ed8; background: #e0e7ff; }
      .status { margin: 0 0 8px; color: #475569; }
      .status.ok { color: #15803d; }
      .status.warn { color: #b45309; }
      #result { max-height: 260px; margin-top: 14px; overflow: auto; border: 1px solid #dbe3ef; border-radius: 7px; background: #fff; }
      .summary { margin: 0; padding: 10px; font-weight: 600; }
      .result-item { padding: 8px 10px; border-top: 1px solid #edf2f7; word-break: break-all; }
      .result-item.ok { color: #166534; }
      .result-item.error { color: #b91c1c; }
    </style>
  </head>
  <body>
    <main>
      <h1>灵算批量兑换</h1>
      <p id="auth-status" class="status">正在检查 Authorization…</p>
      <button id="refresh-page" class="secondary" type="button">刷新灵算页面并捕获 Authorization</button>
      <form id="redeem-form">
        <label for="codes">兑换码（每行一个）</label>
        <textarea id="codes" rows="10" placeholder="CODE-001&#10;CODE-002" autofocus></textarea>
        <label for="concurrency">并发数（1–10）</label>
        <input id="concurrency" type="number" min="1" max="10" value="5" required />
        <button id="submit" class="primary" type="submit">开始兑换</button>
      </form>
      <section id="result" hidden aria-live="polite"></section>
    </main>
    <script type="module" src="popup.js"></script>
  </body>
</html>
